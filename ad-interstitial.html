<script>
        function activatePendingDownload() {
            try {
                const queue = JSON.parse(localStorage.getItem('download_queue') || '[]');
                const pendingItem = queue.find(item => item.status === 'pending');
                if (pendingItem) {
                    pendingItem.status = 'downloading';
                    localStorage.setItem('download_queue', JSON.stringify(queue));
                }
            } catch (e) {
                console.error("Failed to activate download:", e);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.getElementById('close-ad-btn');

            const closeProgress = document.getElementById('close-progress');
            const adProgressBar = document.getElementById('ad-progress-bar');
            const ctaBtn = document.getElementById('cta-install-btn');
            
            let timeLeft = 5;
            const duration = 5000; // 5 seconds
            
            // Start bottom progress bar
            setTimeout(() => {
                adProgressBar.style.width = '100%';
                closeProgress.style.strokeDashoffset = '0';
            }, 50);

            // Make CTA install button redirect directly
            if (ctaBtn) {
                ctaBtn.addEventListener('click', () => {
                    activatePendingDownload();
                    document.body.innerHTML = '<div class="flex flex-col items-center justify-center h-screen"><span class="material-symbols-outlined text-display-lg text-primary animate-pulse" style="font-variation-settings: \'FILL\' 1; font-size: 80px;">check_circle</span><h2 class="font-headline-lg-mobile text-headline-lg-mobile mt-4 text-on-surface">Resuming Download...</h2></div>';
                    setTimeout(() => {
                        window.location.href = 'download-queue.html';
                    }, 1200);
                });
            }

            const timerInterval = setInterval(() => {
                timeLeft -= 1;

                    closeTimer.textContent = timeLeft;

                    clearInterval(timerInterval);
                    closeTimer.classList.add('hidden');
                    closeIcon.classList.remove('hidden');
