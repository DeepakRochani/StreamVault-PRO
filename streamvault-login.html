<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center p-4 relative overflow-hidden">
    
    <!-- Background Decor -->
    <div class="absolute -z-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/10 blur-[150px] rounded-full pointer-events-none"></div>

    <div class="w-full max-w-md bg-surface-container-high/50 p-5 rounded-3xl border border-white/10 backdrop-blur-xl shadow-2xl relative z-10">
        
        <div class="flex justify-center mb-5">
            <h1 class="font-display font-extrabold text-3xl text-primary tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">
                StreamVault PRO
            </h1>
        </div>

        <h2 id="auth-title" class="text-2xl font-sans font-bold text-on-surface mb-4 text-center">Welcome Back</h2>

        <!-- Google Mock Login -->
        <button onclick="mockGoogleLogin()" class="w-full bg-white text-black font-sans font-bold py-2 px-4 rounded-xl flex items-center justify-center gap-3 transition-transform hover:scale-[1.02] active:scale-95 mb-4">
            <img loading="lazy" src="https://www.google.com/favicon.ico" alt="Google" class="w-5 h-5">
            Continue with Google
        </button>

        <div class="flex items-center gap-4 mb-4">
            <div class="flex-grow border-t border-white/10"></div>
            <span class="text-xs text-on-surface-variant font-mono uppercase tracking-widest">OR EMAIL</span>
            <div class="flex-grow border-t border-white/10"></div>
        </div>

        <form id="auth-form" class="flex flex-col gap-4">
            <div id="name-field" class="hidden flex-col gap-1">
                <label class="text-sm font-sans text-on-surface-variant ml-1">Name</label>
                <input type="text" id="name" placeholder="John Doe" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-on-surface focus:outline-none focus:border-primary transition-colors">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm font-sans text-on-surface-variant ml-1">Email</label>
                <input type="email" id="email" required placeholder="you@example.com" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-on-surface focus:outline-none focus:border-primary transition-colors">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm font-sans text-on-surface-variant ml-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-on-surface focus:outline-none focus:border-primary transition-colors">
                <div id="forgot-password" class="w-full text-right mt-1">
                    <a href="#" class="text-xs text-primary hover:text-primary-container transition-colors">Forgot Password?</a>
                </div>
            </div>

            <div id="confirm-password-field" class="hidden flex-col gap-1">
                <label class="text-sm font-sans text-on-surface-variant ml-1">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="••••••••" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-on-surface focus:outline-none focus:border-primary transition-colors">
            </div>

            <div class="flex items-center gap-2 mt-1 px-1">
                <input type="checkbox" id="remember" class="w-4 h-4 rounded border-white/10 bg-surface text-primary focus:ring-primary focus:ring-offset-background">
                <label for="remember" class="text-sm text-on-surface-variant select-none cursor-pointer">Remember me (Stay Logged In)</label>
            </div>

            <p id="error-msg" class="text-error text-sm text-center hidden"></p>

            <button type="submit" id="submit-btn" class="w-full mt-2 bg-primary hover:bg-primary-container text-on-primary font-sans font-bold py-2 px-4 rounded-xl transition-all hover:shadow-[0_0_20px_rgba(255,85,64,0.3)] active:scale-95">
                Sign In
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-on-surface-variant">
            <span id="toggle-text">Don't have an account?</span> 
            <button onclick="toggleAuthMode()" id="toggle-btn" class="text-primary hover:text-primary-container font-bold transition-colors">Sign up</button>
        </p>

    </div>

    <!-- Go Back -->
    <a href="index.html" class="mt-5 text-on-surface-variant hover:text-on-surface font-sans text-sm flex items-center gap-2 transition-colors">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        Back to App
    </a>

    <script>
        let isLogin = true;

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Welcome Back' : 'Create Account';
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggle-btn').innerText = isLogin ? "Sign up" : "Sign in";
            document.getElementById('submit-btn').innerText = isLogin ? "Sign In" : "Create Account";
            document.getElementById('name-field').style.display = isLogin ? 'none' : 'flex';
            document.getElementById('confirm-password-field').style.display = isLogin ? 'none' : 'flex';
            document.getElementById('forgot-password').style.display = isLogin ? 'block' : 'none';
            document.getElementById('error-msg').classList.add('hidden');
        }

        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        
        // Log guest login attempt
        fetch((window.API_BASE_URL || '') + '/api/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'Guest Login Attempts', details: urlParams.get('mode') === 'register' ? 'Viewed Register' : 'Viewed Login' })
        }).catch(e=>{});

        if (urlParams.get('mode') === 'register' && isLogin) {
            toggleAuthMode();
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const confirmPass = document.getElementById('confirm-password').value;
            
            if (!isLogin && password !== confirmPass) {
                const msg = document.getElementById('error-msg');
                msg.innerText = "Passwords do not match.";
                msg.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Please wait...';
            
            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name })
                });
                const data = await res.json();
                if (data.success) {
                    const redirect = sessionStorage.getItem('redirectUrl') || 'index.html';
                    sessionStorage.removeItem('redirectUrl');
                    window.location.href = redirect;
                } else {
                    throw new Error(data.error || 'Authentication failed');
                }
            } catch (err) {
                const msg = document.getElementById('error-msg');
                msg.innerText = err.message;
                msg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = isLogin ? 'Sign In' : 'Create Account';
            }
        });

        async function mockGoogleLogin() {
            try {
                const res = await fetch((window.API_BASE_URL || '') + '/api/auth/mock-google', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    const redirect = sessionStorage.getItem('redirectUrl') || 'index.html';
                    sessionStorage.removeItem('redirectUrl');
                    window.location.href = redirect;
                }
            } catch (err) {
                alert('Google Login failed');
            }
        }
    </script>

    <!-- BETA WIDGET -->
    <div id="beta-widget" class="fixed bottom-4 right-4 z-[100] flex flex-col items-end gap-2 group pointer-events-none">
