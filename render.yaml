services:
  - type: web
    name: streamvault-pro
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install --include=dev && npm run build && mkdir -p bin && curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -o bin/yt-dlp && chmod a+rx bin/yt-dlp
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DOWNLOAD_PATH
        value: /opt/render/project/data
      - key: SUPABASE_URL
        value: https://xphhazisatxmlulhqxvi.supabase.co
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwaGhhemlzYXR4bWx1bGhxeHZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjE3MDgsImV4cCI6MjA5NzQ5NzcwOH0.AXKS6RQjzGJYCig5mzWoCwKQ6e27TWLX2GAlvTsInwM
    disk:
      name: streamvault-data
      mountPath: /opt/render/project/data
      sizeGB: 10
